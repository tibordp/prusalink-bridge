<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrusaLink Bridge — manual test</title>
    <style>
      body {
        font:
          14px/1.5 system-ui,
          sans-serif;
        max-width: 680px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1a1d21;
      }
      h1 {
        font-size: 20px;
      }
      button {
        font: inherit;
        padding: 6px 12px;
        margin: 2px 4px 2px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #ea6c2d;
        color: #fff;
        border-color: #ea6c2d;
      }
      input,
      textarea,
      select {
        font: inherit;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
      }
      label {
        font-size: 12px;
        color: #666;
        display: block;
        margin: 10px 0 2px;
      }
      pre {
        background: #f4f5f7;
        border: 1px solid #e2e5ea;
        border-radius: 8px;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 320px;
        overflow: auto;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: end;
      }
      .grow {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <h1>PrusaLink Bridge — manual test</h1>
    <p>
      Serve this over <code>http</code> or <code>https</code> (the relay only
      runs there) with the extension loaded. Open the console for details.
    </p>

    <div class="row">
      <button id="available">available()</button>
      <button id="version">version()</button>
      <button id="request" class="primary">requestAccess()</button>
      <button id="request-force">requestAccess(force)</button>
      <button id="printers">printers()</button>
    </div>

    <label>Printer</label>
    <select id="printer"></select>

    <div class="row">
      <button id="status">status()</button>
      <button id="cancel">cancel()</button>
    </div>

    <label
      >File to upload (optional — for binary <code>.bgcode</code> or any
      file)</label
    >
    <input type="file" id="file" />

    <label>File name on printer</label>
    <input id="filename" value="manual-test.gcode" />

    <label>…or inline G-code (used only when no file is picked)</label>
    <textarea id="gcode" rows="4">
G28
G1 Z5 F300
M117 Bridge manual test
</textarea>

    <div class="row">
      <label style="width: auto; white-space: nowrap"
        ><input type="checkbox" id="start" checked style="width: auto" /> start
        immediately</label
      >
      <label class="grow"
        >timeout ms (blank = none)
        <input id="timeout" type="number" min="0" placeholder="none"
      /></label>
    </div>
    <div class="row">
      <button id="print" class="primary">print()</button>
      <button id="cancel-upload" disabled>cancel upload</button>
      <span id="upstatus" class="grow"></span>
    </div>

    <h3>Log</h3>
    <pre id="log"></pre>

    <script type="module">
      import {
        createBridge,
        BridgeError,
      } from '../packages/client/dist/index.js'

      const bridge = createBridge()
      const logEl = document.getElementById('log')
      const sel = document.getElementById('printer')
      const log = (label, value) => {
        const text =
          value instanceof BridgeError
            ? `BridgeError ${value.code}: ${value.message}`
            : JSON.stringify(value, null, 2)
        logEl.textContent = `▶ ${label}\n${text}\n\n` + logEl.textContent
      }
      const run = (label, fn) => async () => {
        try {
          log(label, await fn())
        } catch (e) {
          log(label + ' (error)', e)
        }
      }
      const fillPrinters = (printers) => {
        sel.replaceChildren()
        for (const p of printers) {
          const o = document.createElement('option')
          o.value = p.id
          o.textContent = `${p.name}${p.model ? ' (' + p.model + ')' : ''}`
          sel.append(o)
        }
      }

      document.getElementById('available').onclick = run('available', () =>
        bridge.available(),
      )
      document.getElementById('version').onclick = run('version', () =>
        bridge.version(),
      )
      const doRequest = (force) =>
        run(force ? 'requestAccess(force)' : 'requestAccess', async () => {
          const printers = await bridge.requestAccess({
            appName: 'Manual Test',
            reason: 'exercise the bridge end-to-end',
            force,
          })
          fillPrinters(printers)
          return printers
        })
      document.getElementById('request').onclick = doRequest(false)
      document.getElementById('request-force').onclick = doRequest(true)
      document.getElementById('printers').onclick = run(
        'printers',
        async () => {
          const printers = await bridge.printers()
          fillPrinters(printers)
          return printers
        },
      )
      document.getElementById('status').onclick = run('status', () =>
        bridge.status(sel.value),
      )
      document.getElementById('cancel').onclick = run('cancel', () =>
        bridge.cancel(sel.value),
      )
      // When a file is chosen, default the on-printer name to the file's name.
      const fileInput = document.getElementById('file')
      const nameInput = document.getElementById('filename')
      fileInput.onchange = () => {
        if (fileInput.files[0]) nameInput.value = fileInput.files[0].name
      }

      const upstatus = document.getElementById('upstatus')
      const cancelUploadBtn = document.getElementById('cancel-upload')
      let uploadAbort = null

      cancelUploadBtn.onclick = () => uploadAbort && uploadAbort.abort()

      document.getElementById('print').onclick = async () => {
        const file = fileInput.files[0]
        // A picked file (Blob) is uploaded verbatim — works for binary .bgcode.
        const gcode = file ? file : document.getElementById('gcode').value
        const tv = document.getElementById('timeout').value
        uploadAbort = new AbortController()
        cancelUploadBtn.disabled = false
        upstatus.textContent = 'uploading…'
        try {
          const res = await bridge.print(sel.value, {
            name: nameInput.value,
            gcode,
            start: document.getElementById('start').checked,
            timeoutMs: tv ? Number(tv) : undefined,
            signal: uploadAbort.signal,
          })
          upstatus.textContent = 'done'
          log('print', res)
        } catch (e) {
          upstatus.textContent = e instanceof BridgeError ? e.code : 'error'
          log('print (error)', e)
        } finally {
          cancelUploadBtn.disabled = true
          uploadAbort = null
        }
      }
    </script>
  </body>
</html>
