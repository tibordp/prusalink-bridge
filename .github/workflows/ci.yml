name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The extension imports the client's built types, so build it first.
      - name: Build client shim
        run: pnpm build:client

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # `pnpm zip(:firefox)` builds the client, then the extension, then packages
      # the Chrome + Firefox store zips (plus a Firefox sources zip for AMO).
      # Collect them into a fixed dir from wherever WXT wrote `.output`; the final
      # `ls` fails the step loudly (with a listing) if nothing was produced.
      - name: Package store zips
        run: |
          pnpm zip
          pnpm zip:firefox
          mkdir -p dist-zips
          cp extension/.output/*.zip dist-zips/ 2>/dev/null || true
          cp .output/*.zip dist-zips/ 2>/dev/null || true
          ls -la dist-zips/*.zip

      - name: Upload store zips
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: dist-zips/*.zip
          if-no-files-found: error
          retention-days: 14
